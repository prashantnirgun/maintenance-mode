# SPA from dist. GET /api/config serves optional config.json (volume or bake-in).
# POST/PUT to /api/config are denied (static deploy); use a mounted config.json or rebuild.

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|otf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /api/config {
        default_type application/json;
        charset utf-8;

        limit_except GET {
            deny all;
        }

        alias /usr/share/nginx/html/config.json;
        error_page 404 = @config_empty;
    }

    location @config_empty {
        internal;
        default_type application/json;
        charset utf-8;
        return 200 '{}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
